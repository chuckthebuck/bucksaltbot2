- command: bash scripts/start_celery.sh
  continuous: true
  cpu: '1.0'
  image: tool-buckbot/tool-buckbot:latest
  mem: 1.0Gi
  mount: all
  name: buckbot-celery
- command: bash scripts/start_gunicorn.sh
  continuous: true
  cpu: '0.5'
  image: tool-buckbot/tool-buckbot:latest
  mount: all
  name: buckbot-web
  port: '8000'

