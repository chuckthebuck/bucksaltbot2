
# https://wikitech.wikimedia.org/wiki/Help:Toolforge/Jobs_framework

---

- name: "buckbot-web"
  command: "bash scripts/start_gunicorn.sh"
  image: tool-buckbot/tool-buckbot:latest
  continuous: true
  port: 8000
  mount: all
  mem: 512Mi
  cpu: "0.5"
  

- name: "buckbot-celery"
  command: "bash scripts/start_celery.sh"
  image: tool-buckbot/tool-buckbot:latest
  continuous: true
  mount: all
  health-check-script: "bash scripts/ping_celery.sh"
  mem: 1Gi
  cpu: "1"


- name: "buckbot-ping"
  command: "bash scripts/ping_celery.sh"
  image: tool-buckbot/tool-buckbot:latest
  continuous: true
  mount: all
  mem: 256Mi
  cpu: "0.25"

