- command: bash scripts/start_celery.sh
  continuous: true
  cpu: '1.0'
  image: tool-buckbot/tool-buckbot:latest
  mem: 1.0Gi
  mount: all
  name: buckbot-celery
 
- command: bash -c "export NOTDEV=1; python3 -m module_job_controller"
  continuous: true
  cpu: '0.2'
  image: tool-buckbot/tool-buckbot:latest
  mem: 512Mi
  mount: all
  name: buckbot-module-controller
- name: chuckbot-status-cron
  command: bash -c "export NOTDEV=1; export STATUS_UPDATE_MIN_INTERVAL_SECONDS=${STATUS_UPDATE_MIN_INTERVAL_SECONDS:-86400}; cd $HOME && python3 status_updater.py"
  image: tool-buckbot/tool-buckbot:latest
  schedule: "*/15 * * * *"
  cpu: 0.1
  mem: 256Mi
- name: four-award-four-award-sync
  command: bash -c 'export NOTDEV=1; timeout 600 python3 -m module_runner --module four_award --job four-award-sync --trigger schedule'
  image: tool-buckbot/tool-buckbot:latest
  schedule: "*/15 * * * *"
  cpu: 0.1
  mem: 256Mi
  mount: all
