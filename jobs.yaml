- command: bash scripts/start_celery.sh
  continuous: true
  cpu: '1.0'
  image: tool-buckbot/tool-buckbot:latest
  mem: 1.0Gi
  mount: all
  name: buckbot-celery
  health-check-script: bash scripts/ping_celery.sh
- name: chuckbot-status-cron
  command: bash -c "cd $HOME && python3 status_updater.py"
  image: tool-buckbot/tool-buckbot:latest
  schedule: "0 0 * * *"
  cpu: 0.1
  mem: 256Mi

