{% extends "base.html" %}
{% block content %}

<h2>Rollback job queue</h2>

<p>Create and monitor rollback jobs.</p>

<style>
.status{padding:3px 8px;border-radius:4px;font-weight:bold}
.status-queued{background:#eaf3ff;color:#3366cc}
.status-running{background:#fff3cd;color:#946200}
.status-completed{background:#d4edda;color:#155724}
.status-failed{background:#f8d7da;color:#842029}
.status-canceled{background:#eee;color:#444}

.progress{height:10px;background:#ddd;border-radius:6px;overflow:hidden}
.progress>div{height:100%;background:#36c;width:0%}

.job-details{display:none;background:#f8f9fa;padding:10px;border:1px solid #ccc}
</style>

<h3>Create job</h3>

<form id="create-form">

<input id="requested-by" value="{{username}}" hidden>

<label>Status token (optional)</label>
<input id="token" type="password">

<label>Items (File:Title|User|Summary)</label>
<textarea id="items" rows="5"></textarea>

<label>
<input type="checkbox" id="dry">
Dry run
</label>

<button>Create</button>

</form>

<pre id="create-result"></pre>

<h3>Your jobs</h3>

<table class="wikitable">

<tr>
<th>ID</th>
<th>Status</th>
<th>Progress</th>
<th>Created</th>
<th>Actions</th>
</tr>

{% for j in jobs %}

<tr id="job-{{j[0]}}">

<td>
<a onclick="toggle({{j[0]}})">
{{j[0]}}
</a>
</td>

<td id="status-{{j[0]}}">
<span class="status status-{{j[2]}}">
{{j[2]}}
</span>
</td>

<td>

<div class="progress">
<div id="bar-{{j[0]}}"></div>
</div>

<span id="text-{{j[0]}}">0%</span>

</td>

<td>{{j[4]}}</td>

<td id="actions-{{j[0]}}"></td>

</tr>

<tr>
<td colspan="5">
<div id="details-{{j[0]}}" class="job-details"></div>
</td>
</tr>

{% endfor %}

</table>

<script>

/* ---------------- job list ---------------- */

let JOB_IDS=[
{% for j in jobs %}
{{j[0]}},
{% endfor %}
]

/* ---------------- helpers ---------------- */

const token=()=>document.getElementById("token").value.trim()

const headers=json=>{
let h={}
if(json)h["Content-Type"]="application/json"
if(token())h["X-Status-Token"]=token()
return h
}

const esc=s=>String(s)
.replaceAll("&","&amp;")
.replaceAll("<","&lt;")
.replaceAll(">","&gt;")

/* ---------------- row update ---------------- */

function update(id,d){

let done=(d.completed||0)+(d.failed||0)
let pct=d.total?Math.round(done/d.total*100):0

let bar=document.getElementById(`bar-${id}`)
if(bar)bar.style.width=pct+"%"

let txt=document.getElementById(`text-${id}`)
if(txt)txt.textContent=`${done}/${d.total}`

let st=document.getElementById(`status-${id}`)
if(st)st.innerHTML=`<span class="status status-${d.status}">${d.status}</span>`

let act=document.getElementById(`actions-${id}`)
if(!act)return

act.innerHTML=""

if(d.status==="failed")
act.innerHTML+=`<button onclick="retry(${id})">Retry</button>`

if(d.status==="queued"||d.status==="running")
act.innerHTML+=`<button onclick="cancel(${id})">Cancel</button>`

/* stop polling finished jobs */
if(d.status==="completed"||d.status==="failed"||d.status==="canceled"){
JOB_IDS=JOB_IDS.filter(x=>x!==id)
}

}

/* ---------------- progress polling ---------------- */

async function refresh(){

if(!JOB_IDS.length)return

const r=await fetch(
"/api/v1/rollback/jobs/progress?ids="+JOB_IDS.join(",")
)

const data=await r.json()

if(data.jobs)
data.jobs.forEach(j=>update(j.id,j))

}

/* ---------------- job details ---------------- */

async function toggle(id){

let el=document.getElementById(`details-${id}`)

if(el.style.display==="block"){
el.style.display="none"
return
}

const r=await fetch(`/api/v1/rollback/jobs/${id}`)
const d=await r.json()

el.style.display="block"

el.innerHTML=`
<b>Status:</b> ${esc(d.status)}<br>
<b>Total:</b> ${d.total}<br>
<b>Completed:</b> ${d.completed}<br>
<b>Failed:</b> ${d.failed}<br>
<pre>${esc(JSON.stringify(d.items,null,2))}</pre>
`

}

/* ---------------- job actions ---------------- */

async function retry(id){

if(!confirm("Retry job "+id+"?"))return

await fetch(`/api/v1/rollback/jobs/${id}/retry`,{
method:"POST",
headers:headers()
})

}

async function cancel(id){

if(!confirm("Cancel job "+id+"?"))return

await fetch(`/api/v1/rollback/jobs/${id}`,{
method:"DELETE",
headers:headers()
})

}

/* ---------------- dynamic row insertion ---------------- */

function addJobRow(id){

JOB_IDS.push(id)

const table=document.querySelector(".wikitable")

const row=`
<tr id="job-${id}">

<td>
<a onclick="toggle(${id})">${id}</a>
</td>

<td id="status-${id}">
<span class="status status-queued">queued</span>
</td>

<td>
<div class="progress">
<div id="bar-${id}"></div>
</div>
<span id="text-${id}">0%</span>
</td>

<td>just now</td>

<td id="actions-${id}"></td>

</tr>

<tr>
<td colspan="5">
<div id="details-${id}" class="job-details"></div>
</td>
</tr>
`

table.insertAdjacentHTML("afterbegin",row)

}

/* ---------------- job creation ---------------- */

document.getElementById("create-form")
.addEventListener("submit",async e=>{

e.preventDefault()

let items=document.getElementById("items").value
.split("\n")
.map(l=>l.trim())
.filter(Boolean)
.map(l=>{
let[t,u,...s]=l.split("|")
return{
title:t.trim(),
user:u.trim(),
summary:s.join("|")||null
}
})

const r=await fetch("/api/v1/rollback/jobs",{

method:"POST",

headers:headers(true),

body:JSON.stringify({
requested_by:document.getElementById("requested-by").value,
dry_run:document.getElementById("dry").checked,
items:items
})

})

const result=await r.json()

document.getElementById("create-result")
.textContent=JSON.stringify(result,null,2)

if(r.ok) addJobRow(result.job_id)

})

/* ---------------- polling system ---------------- */

let timer=null

function start(){
if(timer)return
refresh()
timer=setInterval(refresh,5000)
}

function stop(){
clearInterval(timer)
timer=null
}

document.addEventListener("visibilitychange",()=>{
if(document.hidden)stop()
else start()
})

window.addEventListener("load",()=>{
if(!document.hidden)start()
})

</script>

{% endblock %}
