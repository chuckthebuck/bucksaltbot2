{% extends "base.html" %}
{% block content %}

<h2>Rollback from diff</h2>
<p>Maintainer tool to queue rollback jobs starting from a specific user diff.</p>

<script id="from-diff-props" type="application/json">
{{ {
  "username": username,
  "default_limit": default_limit,
  "max_limit": max_limit,
  "from_diff_dry_run_only": from_diff_dry_run_only
}|tojson }}
</script>

{% endblock %}
