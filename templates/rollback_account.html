{% extends "base.html" %}
{% block content %}

<h2>Rollback by account</h2>
<p>Submit account rollback requests for a target user's latest rollbackable edits (maintainer approval required).</p>

<div id="app"></div>

<script id="from-account-props" type="application/json">
{{ {
  "username": username,
  "default_limit": default_limit,
  "max_limit": max_limit,
  "from_diff_dry_run_only": from_diff_dry_run_only
}|tojson }}
</script>

{% endblock %}
