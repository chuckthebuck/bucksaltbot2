services:
  redis:
    image: redis:latest
    container_name: chuckbot-redis
    ports:
      - "6379:6379"
  mariadb:
    image: mariadb:latest
    container_name: chuckbot-mariadb
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: chuckbot_local
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    volumes:
      - ./data/mariadb:/var/lib/mysql
    ports:
      - "3306:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
  celery:
    build:
      context: .
      dockerfile: Dockerfile.celery
    container_name: chuckbot-celery
    volumes:
      - .:/app
      - ./logs:/app/logs
    depends_on:
      - redis
      - mariadb
    environment:
      CHUCKBOT_LOCAL_SAFE_MODE: "1"
      ENABLE_MODULE_LOADING: "1"
      LIVE_TEST_DISABLE_STATUS_UPDATES: "1"
      TOOL_REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/9
      CELERY_RESULT_BACKEND: redis://redis:6379/9
      TOOL_TOOLSDB_HOST: mariadb
      TOOL_TOOLSDB_USER: user
      TOOL_TOOLSDB_PASSWORD: password
      TOOL_TOOLSDB_DATABASE: chuckbot_local
      TOOL_DATA_DIR: /app/data
      PYWIKIBOT_DIR: /app/data/pywikibot
    links:
      - redis
      - mariadb
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    container_name: chuckbot-web
    environment:
      CHUCKBOT_LOCAL_SAFE_MODE: "1"
      ENABLE_MODULE_LOADING: "1"
      FLASK_DEBUG: "1"
      LIVE_TEST_DISABLE_STATUS_UPDATES: "1"
      PORT: "8000"
      TOOL_REDIS_URI: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/9
      CELERY_RESULT_BACKEND: redis://redis:6379/9
      TOOL_TOOLSDB_HOST: mariadb
      TOOL_TOOLSDB_USER: user
      TOOL_TOOLSDB_PASSWORD: password
      TOOL_TOOLSDB_DATABASE: chuckbot_local
      TOOL_DATA_DIR: /app/data
      PYWIKIBOT_DIR: /app/data/pywikibot
      BOT_ADMIN_ACCOUNTS: chuckbot
      SECRET_KEY: docker-dev-insecure-secret
    volumes:
      - .:/app
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - mariadb
    links:
      - redis
      - mariadb
