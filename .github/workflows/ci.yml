name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    name: Backend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pip-audit

      - name: Ruff lint
        run: ruff check .

      - name: Run backend tests
        run: pytest -q tests/test_module_*.py

      - name: Dependency audit
        run: |
          set +e
          pip-audit --progress-spinner=off
          audit_status=$?
          set -e
          # pip-audit returns 1 when vulnerabilities are found, >1 on execution failures.
          if [ "$audit_status" -gt 1 ]; then
            exit "$audit_status"
          fi

  frontend:
    name: Frontend checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: npm

      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests
        run: npm run test

      - name: Build smoke test
        run: npm run build
