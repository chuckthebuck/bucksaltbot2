name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: "30 3 * * 1"

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    # If GitHub code scanning "Default setup" is enabled, advanced-workflow SARIF uploads
    # are rejected. Enable this job by setting repo variable CODEQL_ADVANCED_ENABLED=true
    # after switching code scanning to advanced/manual mode.
    if: ${{ vars.CODEQL_ADVANCED_ENABLED == 'true' }}
    name: Analyze
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        language: ["javascript", "python"]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@v4

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
