name: Release framework

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump framework patch version
        shell: bash
        run: |
          python3 scripts/bump-framework-version.py --part patch --env-file version.env
          cat version.env >> "$GITHUB_OUTPUT"

      - name: Commit version bump
        shell: bash
        run: |
          source version.env
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add VERSION package.json package-lock.json
          git commit -m "chore(release): framework-v${VERSION}"

      - name: Tag release
        shell: bash
        run: |
          source version.env
          git tag "framework-v${VERSION}"
          git push origin HEAD:${GITHUB_REF_NAME}
          git push origin "framework-v${VERSION}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          source version.env
          gh release create "framework-v${VERSION}" \
            --title "framework-v${VERSION}" \
            --notes "Automated framework release for framework-v${VERSION}."
